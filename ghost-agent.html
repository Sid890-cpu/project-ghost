<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghost Agent — AI Research Agent powered by Project Ghost</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050508;--surface:#0c0c12;--card:#111118;
  --border:#1e1e2e;--green:#00e5a0;--green2:#00b87d;
  --blue:#4d9fff;--amber:#f5a623;--red:#ff4d6d;
  --text:#e8e8f0;--muted:#6b6b8a;--white:#fff;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;display:flex;flex-direction:column}

/* Grid background */
body::before{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,229,160,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,160,0.03) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;z-index:0;
}

/* Header */
header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border);background:rgba(5,5,8,0.9);backdrop-filter:blur(10px);position:relative;z-index:10;flex-shrink:0}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:var(--green);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-text{font-size:16px;font-weight:800;letter-spacing:-0.5px}
.logo-text span{color:var(--green)}
.header-badge{font-family:'Space Mono',monospace;font-size:10px;color:var(--green);background:rgba(0,229,160,0.08);border:1px solid rgba(0,229,160,0.2);padding:4px 10px;border-radius:4px;letter-spacing:1px}
.status-dot{display:flex;align-items:center;gap:6px;font-family:'Space Mono',monospace;font-size:11px;color:var(--muted)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* Main layout */
.main{display:flex;flex:1;overflow:hidden;position:relative;z-index:1}

/* Sidebar */
.sidebar{width:280px;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--surface);flex-shrink:0}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border)}
.sidebar-title{font-size:11px;font-family:'Space Mono',monospace;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.task-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'Syne',sans-serif;font-size:13px;outline:none;resize:none;min-height:80px;line-height:1.5}
.task-input:focus{border-color:rgba(0,229,160,0.4)}
.task-input::placeholder{color:var(--muted)}
.run-btn{width:100%;margin-top:10px;background:var(--green);color:#000;font-weight:700;font-size:13px;border:none;border-radius:8px;padding:11px;cursor:pointer;font-family:'Syne',sans-serif;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px}
.run-btn:hover{background:var(--green2);transform:translateY(-1px)}
.run-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}

.presets{padding:12px 16px;border-bottom:1px solid var(--border)}
.preset-title{font-size:10px;font-family:'Space Mono',monospace;color:var(--muted);letter-spacing:2px;margin-bottom:8px}
.preset-btn{display:block;width:100%;text-align:left;background:none;border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--muted);font-size:12px;font-family:'Syne',sans-serif;cursor:pointer;margin-bottom:6px;transition:all 0.2s}
.preset-btn:hover{border-color:rgba(0,229,160,0.3);color:var(--text);background:rgba(0,229,160,0.04)}
.preset-btn span{color:var(--green);margin-right:6px}

.sources-panel{flex:1;overflow-y:auto;padding:12px 16px}
.sources-title{font-size:10px;font-family:'Space Mono',monospace;color:var(--muted);letter-spacing:2px;margin-bottom:10px}
.source-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px;transition:all 0.2s}
.source-card.active{border-color:rgba(0,229,160,0.3);background:rgba(0,229,160,0.04)}
.source-url{font-family:'Space Mono',monospace;font-size:10px;color:var(--green);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.source-status{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px}
.source-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.source-dot.done{background:var(--green)}
.source-dot.loading{background:var(--amber);animation:pulse 1s infinite}
.source-dot.error{background:var(--red)}

/* Chat area */
.chat{flex:1;display:flex;flex-direction:column;overflow:hidden}
.messages{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-track{background:transparent}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Welcome screen */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;opacity:0.6}
.welcome-icon{font-size:48px;margin-bottom:16px}
.welcome-title{font-size:22px;font-weight:800;margin-bottom:8px}
.welcome-sub{font-size:14px;color:var(--muted);max-width:400px;line-height:1.6}

/* Messages */
.msg{display:flex;gap:12px;animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg-avatar{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.msg-avatar.agent{background:rgba(0,229,160,0.15);border:1px solid rgba(0,229,160,0.3)}
.msg-avatar.user{background:rgba(77,159,255,0.15);border:1px solid rgba(77,159,255,0.3)}
.msg-avatar.system{background:rgba(245,166,35,0.15);border:1px solid rgba(245,166,35,0.3)}
.msg-content{flex:1}
.msg-name{font-size:11px;font-family:'Space Mono',monospace;color:var(--muted);margin-bottom:6px}
.msg-text{font-size:14px;line-height:1.7;color:var(--text)}

/* Tool call */
.tool-call{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;margin-top:8px;font-family:'Space Mono',monospace;font-size:11px}
.tool-call-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;color:var(--amber)}
.tool-call-body{color:var(--muted);line-height:1.8}
.tool-call-body .key{color:var(--blue)}
.tool-call-body .val{color:var(--green)}

/* Result card */
.result-card{background:var(--card);border:1px solid rgba(0,229,160,0.2);border-radius:10px;padding:16px;margin-top:10px}
.result-title{font-size:15px;font-weight:700;color:var(--white);margin-bottom:4px}
.result-meta{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:10px;display:flex;gap:12px;flex-wrap:wrap}
.result-meta span{color:var(--green)}
.result-summary{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:10px}
.result-entities{display:flex;flex-wrap:wrap;gap:6px}
.entity-tag{background:rgba(0,229,160,0.08);border:1px solid rgba(0,229,160,0.2);color:var(--green);font-size:11px;padding:3px 8px;border-radius:4px;font-family:'Space Mono',monospace}

/* Final answer */
.final-answer{background:linear-gradient(135deg,rgba(0,229,160,0.06),rgba(0,229,160,0.02));border:1px solid rgba(0,229,160,0.25);border-radius:12px;padding:20px;margin-top:8px}
.final-label{font-family:'Space Mono',monospace;font-size:10px;color:var(--green);letter-spacing:2px;margin-bottom:10px}
.final-text{font-size:14px;line-height:1.8;color:var(--text)}

/* Thinking indicator */
.thinking{display:flex;align-items:center;gap:8px;font-family:'Space Mono',monospace;font-size:12px;color:var(--muted)}
.thinking-dots{display:flex;gap:4px}
.thinking-dots span{width:5px;height:5px;border-radius:50%;background:var(--green);animation:bounce 1.2s infinite}
.thinking-dots span:nth-child(2){animation-delay:0.2s}
.thinking-dots span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* Scrollbar */
.sidebar::-webkit-scrollbar,.sources-panel::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb,.sources-panel::-webkit-scrollbar-thumb{background:var(--border)}

@media(max-width:640px){
  .sidebar{display:none}
  .header-badge{display:none}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">👻</div>
    <div class="logo-text">Ghost<span>Agent</span></div>
  </div>
  <div class="header-badge">POWERED BY PROJECT GHOST API</div>
  <div class="status-dot"><div class="dot"></div> Live</div>
</header>

<div class="main">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Research Task</div>
      <textarea class="task-input" id="taskInput" placeholder="e.g. Research what OpenAI is working on right now..."></textarea>
      <button class="run-btn" id="runBtn" onclick="runAgent()">
        <span>▶</span> Run Agent
      </button>
    </div>

    <div class="presets">
      <div class="preset-title">Quick Tasks</div>
      <button class="preset-btn" onclick="setTask(this)"><span>🤖</span>What is OpenAI building?</button>
      <button class="preset-btn" onclick="setTask(this)"><span>📈</span>Research Stripe's products</button>
      <button class="preset-btn" onclick="setTask(this)"><span>🔬</span>What's new on HackerNews?</button>
      <button class="preset-btn" onclick="setTask(this)"><span>🛠</span>GitHub trending projects today</button>
    </div>

    <div class="sources-panel">
      <div class="sources-title">Sources Used</div>
      <div id="sourcesList"></div>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat">
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">👻</div>
        <div class="welcome-title">Ghost Agent</div>
        <div class="welcome-sub">An AI research agent that reads the web using Project Ghost API. Give it a task and watch it work.</div>
      </div>
    </div>
  </div>
</div>

<script>
const GHOST_API = 'https://project-ghost-production.up.railway.app/distill';
const GHOST_KEY = 'Bearer ghost_sk_BnNnqFiK3w6ra_7KCO72ShTjRyAtkmdjziAnyi_rDHg';

const TASK_URLS = {
  'What is OpenAI building?': ['https://openai.com', 'https://openai.com/blog'],
  "Research Stripe's products": ['https://stripe.com', 'https://stripe.com/payments'],
  "What's new on HackerNews?": ['https://news.ycombinator.com'],
  'GitHub trending projects today': ['https://github.com/trending'],
};

function setTask(btn) {
  document.getElementById('taskInput').value = btn.textContent.trim().replace(/^[^\w]+/, '');
}

function addSource(url, status='loading') {
  const list = document.getElementById('sourcesList');
  const id = 'src-' + Date.now();
  const div = document.createElement('div');
  div.className = 'source-card active';
  div.id = id;
  div.innerHTML = `
    <div class="source-url">${url.replace('https://', '')}</div>
    <div class="source-status">
      <div class="source-dot ${status}"></div>
      <span>${status === 'loading' ? 'Fetching...' : status === 'done' ? 'Extracted' : 'Blocked'}</span>
    </div>`;
  list.appendChild(div);
  return id;
}

function updateSource(id, status, text) {
  const el = document.getElementById(id);
  if(!el) return;
  el.querySelector('.source-dot').className = 'source-dot ' + status;
  el.querySelector('.source-status span').textContent = text;
}

function addMsg(avatar, name, content, type='text') {
  const welcome = document.getElementById('welcome');
  if(welcome) welcome.remove();

  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg';
  div.innerHTML = `
    <div class="msg-avatar ${type === 'system' ? 'system' : type === 'user' ? 'user' : 'agent'}">${avatar}</div>
    <div class="msg-content">
      <div class="msg-name">${name}</div>
      <div class="msg-text">${content}</div>
    </div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div.querySelector('.msg-text');
}

function addThinking() {
  const el = addMsg('👻', 'Ghost Agent', '');
  el.innerHTML = `<div class="thinking"><div class="thinking-dots"><span></span><span></span><span></span></div> Thinking...</div>`;
  return el;
}

async function fetchGhost(url) {
  const res = await fetch(GHOST_API, {
    method: 'POST',
    headers: {'Content-Type': 'application/json', 'Authorization': GHOST_KEY},
    body: JSON.stringify({url})
  });
  return await res.json();
}

async function runAgent() {
  const task = document.getElementById('taskInput').value.trim();
  if(!task) return;

  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.innerHTML = '<span>⏳</span> Agent Running...';
  document.getElementById('sourcesList').innerHTML = '';

  // User message
  addMsg('👤', 'You', task, 'user');

  // Find URLs for this task
  let urls = TASK_URLS[task];
  if(!urls) {
    // Extract from task or use defaults
    if(task.toLowerCase().includes('openai')) urls = ['https://openai.com'];
    else if(task.toLowerCase().includes('stripe')) urls = ['https://stripe.com'];
    else if(task.toLowerCase().includes('hackernews') || task.toLowerCase().includes('hacker')) urls = ['https://news.ycombinator.com'];
    else if(task.toLowerCase().includes('github')) urls = ['https://github.com/trending'];
    else if(task.toLowerCase().includes('apple')) urls = ['https://apple.com'];
    else urls = ['https://news.ycombinator.com', 'https://github.com/trending'];
  }

  // Agent thinking
  const thinkEl = addThinking();
  await new Promise(r => setTimeout(r, 800));
  thinkEl.innerHTML = `I'll research this by reading ${urls.length} source${urls.length > 1 ? 's' : ''} using the Ghost API.
    <div class="tool-call">
      <div class="tool-call-header">⚡ distill_web() — calling Ghost API</div>
      <div class="tool-call-body">
        <span class="key">urls:</span> <span class="val">${urls.map(u => u.replace('https://','')).join(', ')}</span><br>
        <span class="key">task:</span> <span class="val">"${task}"</span>
      </div>
    </div>`;

  // Fetch all URLs
  const results = [];
  for(const url of urls) {
    const srcId = addSource(url, 'loading');
    try {
      const data = await fetchGhost(url);
      if(data.title === 'Blocked' || data.signals_data?.error) {
        updateSource(srcId, 'error', 'Blocked');
        continue;
      }
      updateSource(srcId, 'done', `Extracted · ${data.tokens_saved} saved`);
      results.push({url, data});

      // Show result card
      const sd = data.signals_data || {};
      const items = sd.items || [];
      const decision = sd.decision_signal || {};
      const entities = [...new Set(items.flatMap(i => i.entities || []))].slice(0, 6);
      const msgEl = addMsg('👻', 'Ghost Agent', '');
      msgEl.innerHTML = `
        <div class="result-card">
          <div class="result-title">📄 ${data.title || url}</div>
          <div class="result-meta">
            <span>${data.tokens_saved} tokens saved</span>
            <span>confidence ${sd.integrity_layer?.confidence_score || '—'}</span>
            <span>${items.length} signals</span>
          </div>
          <div class="result-summary">${decision.business_intent || '—'}</div>
          <div class="result-entities">${entities.map(e => `<span class="entity-tag">${e}</span>`).join('')}</div>
        </div>`;
      document.getElementById('messages').scrollTop = 99999;
    } catch(e) {
      updateSource(srcId, 'error', 'Error');
    }
  }

  // Final synthesis
  await new Promise(r => setTimeout(r, 600));
  const allEntities = [...new Set(results.flatMap(r => {
    const items = r.data.signals_data?.items || [];
    return items.flatMap(i => i.entities || []);
  }))].slice(0, 8);

  const summaries = results.map(r => r.data.signals_data?.decision_signal?.business_intent).filter(Boolean);

  const finalEl = addMsg('👻', 'Ghost Agent', '');
  finalEl.innerHTML = `
    <div class="final-answer">
      <div class="final-label">RESEARCH COMPLETE — ${results.length} source${results.length !== 1 ? 's' : ''} analyzed</div>
      <div class="final-text">${summaries.join(' ') || 'Research complete. See extracted signals above.'}<br><br>
      <strong>Key entities identified:</strong> ${allEntities.join(', ') || '—'}<br><br>
      <em style="color:var(--muted);font-size:13px">Powered by Project Ghost API — project-ghost-lilac.vercel.app</em>
      </div>
    </div>`;
  document.getElementById('messages').scrollTop = 99999;

  btn.disabled = false;
  btn.innerHTML = '<span>▶</span> Run Agent';
}
</script>
</body>
</html>
